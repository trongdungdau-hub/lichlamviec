<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản trị Lịch Làm Việc</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb; 
            --primary-hover: #1d4ed8;
            --bg-body: #f8fafc;
            --surface: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-light: #e2e8f0;
            --success-bg: #dcfce7;
            --success-text: #15803d;
            --warning-bg: #fef3c7;
            --warning-text: #b45309;
            --total-bg: #eff6ff;
            --total-text: #1d4ed8;
        }

        * { box-sizing: border-box; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        body { background-color: var(--bg-body); color: var(--text-main); min-height: 100vh; padding: 30px 20px; }

        /* ----- POPUP ĐĂNG NHẬP ----- */
        .login-popup {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(8px);
            display: flex; justify-content: center; align-items: center; z-index: 1000; transition: opacity 0.3s ease;
        }
        .login-popup.hidden { opacity: 0; pointer-events: none; }
        .popup-box {
            background: var(--surface); width: 100%; max-width: 400px; border-radius: 24px; padding: 40px 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); text-align: center;
        }
        .popup-box h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
        .popup-box p { color: var(--text-muted); font-size: 14px; margin-bottom: 24px; }
        .popup-box input {
            width: 100%; padding: 14px 20px; border: 2px solid var(--border-light); border-radius: 12px; font-size: 16px;
            outline: none; background: #f8fafc; margin-bottom: 24px;
        }
        .popup-box input:focus { border-color: var(--primary); background: #fff; }
        .popup-box button {
            width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 12px;
            font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.2s;
        }
        .popup-box button:hover { background: var(--primary-hover); }

        /* ----- LAYOUT CHÍNH ----- */
        .main-content { width: 100%; max-width: 1600px; margin: 0 auto; display: none; }
        .main-content.visible { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 16px; }
        .header-bar h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
        
        .action-group { display: flex; gap: 12px; flex-wrap: wrap; }
        
        /* Nút thêm mới */
        .btn-add {
            background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 10px;
            font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 6px rgba(37, 99, 235, 0.2); transition: 0.2s;
        }
        .btn-add:hover { background: var(--primary-hover); transform: translateY(-2px); box-shadow: 0 6px 12px rgba(37, 99, 235, 0.3); }

        .btn-export-img {
            background: white; color: var(--text-main); border: 1px solid var(--border-light); padding: 10px 20px; border-radius: 10px;
            font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); transition: 0.2s;
        }
        .btn-export-img:hover { background: #f1f5f9; }
        
        .btn-export-excel {
            background: #10b981; color: white; border: none; padding: 10px 20px; border-radius: 10px;
            font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 6px rgba(16, 185, 129, 0.2); transition: 0.2s;
        }
        .btn-export-excel:hover { background: #059669; transform: translateY(-2px); box-shadow: 0 6px 12px rgba(16, 185, 129, 0.3); }

        /* ----- BẢNG DỮ LIỆU ----- */
        .table-container { background: var(--surface); border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid var(--border-light); overflow-x: auto; }
        table { width: 100%; border-collapse: separate; border-spacing: 0; text-align: center; }
        th, td { padding: 12px; border-bottom: 1px solid var(--border-light); vertical-align: middle; }
        th { background: #f8fafc; color: var(--text-muted); font-size: 13px; font-weight: 600; text-transform: uppercase; white-space: nowrap; }
        th .day-number { display: block; font-size: 12px; color: var(--primary); margin-top: 4px; font-weight: 700; }
        
        .employee-row td { font-size: 14px; font-weight: 500; background: #fff; }
        .manager-row td { background-color: #f1f5f9; border-bottom: 3px solid #cbd5e1; }

        .total-cell { font-weight: 700; color: var(--total-text); background: var(--total-bg); border-radius: 8px; font-size: 15px; }
        .week-range { font-weight: 600; font-size: 13px; color: var(--text-muted); white-space: nowrap; }

        /* ----- UI CHỌN GIỜ VÀ VAI TRÒ (DROPDOWNS) ----- */
        .time-blocks-container { display: flex; flex-direction: column; gap: 6px; align-items: center; }
        .time-block { display: flex; flex-direction: column; gap: 4px; background: white; padding: 6px; border-radius: 6px; border: 1px solid #cbd5e1; align-items: center; position: relative; width: 100%; max-width: 140px;}
        .time-row { display: flex; align-items: center; gap: 4px; justify-content: center;}
        .role-row { width: 100%; }
        
        select {
            padding: 4px 2px; border: 1px solid var(--border-light); background: #f8fafc; font-size: 12px; font-weight: 600;
            color: var(--text-main); cursor: pointer; outline: none; border-radius: 4px; text-align: center;
        }
        select.t-start, select.t-end { border: none; background: transparent; font-size: 13px; appearance: none; padding: 0; margin: 0;}
        select.role-select { width: 100%; padding: 4px; margin-top: 2px; }
        
        .time-block span { font-weight: bold; color: #94a3b8; }
        
        /* Màu sắc vai trò hiển thị trên web */
        .role-badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; color: white; margin-top: 4px; }
        .role-shipper { background-color: #10b981; } /* Xanh lá */
        .role-picker { background-color: #ec4899; } /* Hồng */
        .role-cashier { background-color: #ef4444; } /* Đỏ */
        .role-caller { background-color: #a855f7; } /* Tím */
        .role-none { display: none; }

        /* ----- NÚT & TRẠNG THÁI ----- */
        .btn-update { background: var(--primary); color: white; border: none; padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; }
        .btn-update:hover { background: var(--primary-hover); }
        .status-badge { display: inline-block; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; white-space: nowrap; }
        .status-pending { background: var(--warning-bg); color: var(--warning-text); }
        .status-approved { background: var(--success-bg); color: var(--success-text); }
        .loading { text-align: center; padding: 60px; color: var(--text-muted); font-weight: 500; }
    </style>
</head>
<body>

<div id="loginPopup" class="login-popup">
    <div class="popup-box">
        <h1>Quản trị hệ thống</h1>
        <p>Vui lòng nhập mật mã để truy cập dữ liệu</p>
        <input type="password" id="passwordInput" placeholder="Nhập mật khẩu" value="admin123">
        <button id="loginBtn">Đăng nhập</button>
    </div>
</div>

<div id="mainContent" class="main-content">
    <div class="header-bar">
        <h1>Quản Lý Giờ Làm Việc</h1>
        <div class="action-group">
            <button id="addManualBtn" class="btn-add">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                Thêm Nhân Sự
            </button>
            <button id="exportImgBtn" class="btn-export-img">📸 Xuất Ảnh</button>
            <button id="exportExcelBtn" class="btn-export-excel">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                Xuất Excel
            </button>
        </div>
    </div>
    <div id="dataArea" class="table-container"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyPaYj1MeoF2p_NaaHmnKO1mG8arsAVMlUSaftBMTKs4d2aye7tqwFq-MISjLE8j6bL/exec';
    
    const loginPopup = document.getElementById('loginPopup');
    const mainContent = document.getElementById('mainContent');
    const passwordInput = document.getElementById('passwordInput');
    const loginBtn = document.getElementById('loginBtn');
    const dataArea = document.getElementById('dataArea');
    const addManualBtn = document.getElementById('addManualBtn');
    const exportImgBtn = document.getElementById('exportImgBtn');
    const exportExcelBtn = document.getElementById('exportExcelBtn');

    let currentLoadedWeek = ''; // Biến toàn cục lưu trữ tuần hiện tại đang xem

    // Mảng chứa các mốc thời gian từ 06:00 đến 24:00 (Mỗi 15 phút)
    const TIME_OPTIONS = ['Nghỉ'];
    for(let h = 6; h <= 24; h++) {
        let hour = h.toString().padStart(2, '0');
        TIME_OPTIONS.push(`${hour}:00`);
        if(h !== 24) {
            TIME_OPTIONS.push(`${hour}:15`);
            TIME_OPTIONS.push(`${hour}:30`);
            TIME_OPTIONS.push(`${hour}:45`);
        }
    }

    const ROLES = [
        { code: '', label: 'Chọn vai trò' },
        { code: 'Shipper', label: 'Shipper', color: 'FF10B981', class: 'role-shipper' }, 
        { code: 'Picker', label: 'Picker', color: 'FFEC4899', class: 'role-picker' },   
        { code: 'Cashier', label: 'Cashier', color: 'FFEF4444', class: 'role-cashier' }, 
        { code: 'Caller', label: 'Caller', color: 'FFA855F7', class: 'role-caller' }    
    ];

    const CODE_TO_LABEL = {
        'tu-do':'Tự do', 'lam-sang':'Làm sáng', 'lam-chieu':'Làm chiều',
        'nua-ca-sang':'Nửa ca sáng', 'nua-ca-chieu':'Nửa ca chiều', 'nghi-ca':'Nghỉ ca', 'nghi-phep':'Nghỉ phép'
    };

    function getDayDates(weekStart) {
        if (!weekStart) return Array(7).fill('');
        let baseDate;
        if (typeof weekStart === 'string' && weekStart.includes('T')) {
            baseDate = new Date(weekStart); baseDate.setHours(12, 0, 0, 0); 
        } else {
            let parts = (weekStart.split(' ')[0] || '').split('-');
            if (parts.length === 3) baseDate = new Date(parseInt(parts[0], 10), parseInt(parts[1], 10) - 1, parseInt(parts[2], 10), 12, 0, 0);
        }
        if (!baseDate || isNaN(baseDate.getTime())) return Array(7).fill('');
        
        let dates = [];
        for (let i = 0; i < 7; i++) {
            let d = new Date(baseDate); d.setDate(baseDate.getDate() + i);
            dates.push(`${d.getDate().toString().padStart(2, '0')}/${(d.getMonth() + 1).toString().padStart(2, '0')}`);
        }
        return dates;
    }

    window.calculateTotalHours = function(managerRow) {
        let totalHours = 0;
        const timeBlocks = managerRow.querySelectorAll('.time-block');
        
        timeBlocks.forEach(block => {
            const startStr = block.querySelector('.t-start').value;
            const endStr = block.querySelector('.t-end').value;
            
            if(startStr !== 'Nghỉ' && endStr !== 'Nghỉ' && startStr && endStr) {
                let [sH, sM] = startStr.split(':').map(Number);
                let [eH, eM] = endStr.split(':').map(Number);
                let startDec = sH + (sM / 60);
                let endDec = eH + (eM / 60);
                if(endDec > startDec) totalHours += (endDec - startDec);
            }
        });
        return totalHours;
    };

    window.updateTotalOnChange = function(el) {
        const row = el.closest('tr');
        const totalCell = row.querySelector('.total-hours-edit');
        if (totalCell) totalCell.textContent = window.calculateTotalHours(row) + "h";
    };

    window.autoUpdateEndTime = function(startSelect) {
        const timeBlock = startSelect.closest('.time-block');
        const endSelect = timeBlock.querySelector('.t-end');
        const startVal = startSelect.value;
        const employeeRequest = timeBlock.dataset.employeeRequest;

        if (startVal === 'Nghỉ' || !startVal) {
             endSelect.value = 'Nghỉ';
             window.updateTotalOnChange(startSelect);
             return;
        }

        let hoursToAdd = 0;
        if (employeeRequest === 'nua-ca-sang' || employeeRequest === 'nua-ca-chieu') {
            hoursToAdd = 4;
        } else if (employeeRequest === 'lam-sang' || employeeRequest === 'lam-chieu' || employeeRequest === 'tu-do') {
            hoursToAdd = 8;
        }

        if (hoursToAdd > 0) {
            let [sH, sM] = startVal.split(':').map(Number);
            let endH = sH + hoursToAdd;
            let endM = sM;

            if (endH > 24) { endH = 24; endM = 0; } 
            else if (endH === 24 && endM > 0) { endH = 24; endM = 0; }

            let endStr = `${endH.toString().padStart(2, '0')}:${endM.toString().padStart(2, '0')}`;
             if (Array.from(endSelect.options).some(opt => opt.value === endStr)) {
                 endSelect.value = endStr;
             }
        }
        window.updateTotalOnChange(startSelect);
    };

    function createTimeSelects(startVal, endVal, roleVal, employeeRequest) {
        let optsStart = TIME_OPTIONS.map(t => `<option value="${t}" ${t===startVal?'selected':''}>${t}</option>`).join('');
        let optsEnd = TIME_OPTIONS.map(t => `<option value="${t}" ${t===endVal?'selected':''}>${t}</option>`).join('');
        let optsRole = ROLES.map(r => `<option value="${r.code}" ${r.code===roleVal?'selected':''}>${r.label}</option>`).join('');
        
        return `
            <div class="time-block" data-employee-request="${employeeRequest}">
                <div class="time-row">
                    <select class="t-start" onchange="window.autoUpdateEndTime(this)">${optsStart}</select>
                    <span>-</span>
                    <select class="t-end" onchange="window.updateTotalOnChange(this)">${optsEnd}</select>
                </div>
                <div class="role-row">
                    <select class="role-select">${optsRole}</select>
                </div>
            </div>
        `;
    }

    function buildManagerCell(existingValue, employeeRequest) {
        let blocksHTML = '';
        if(!existingValue || existingValue === 'Nghỉ' || CODE_TO_LABEL[existingValue]) {
            blocksHTML = createTimeSelects('Nghỉ', 'Nghỉ', '', employeeRequest);
        } else {
            let blocks = existingValue.split(',');
            blocks.forEach((blk, idx) => {
                let parts = blk.split('|');
                let timePart = parts[0];
                let rolePart = parts[1] || '';
                
                let times = timePart.split('-');
                let s = times[0] ? times[0].trim() : 'Nghỉ';
                let e = times[1] ? times[1].trim() : 'Nghỉ';
                
                blocksHTML += createTimeSelects(s, e, rolePart, employeeRequest);
            });
        }
        return `<div class="time-blocks-container">${blocksHTML}</div>`;
    }
    
    function parseAndDisplayEmployeeCell(value, originalRequest) {
         if (!value || value === 'Nghỉ') {
            return `<div style="color:#64748b; font-size:12px;">NV: ${CODE_TO_LABEL[originalRequest] || originalRequest}</div>`;
         }
        if (CODE_TO_LABEL[value]) {
            return `<div style="color:#64748b; font-size:12px;">NV: ${CODE_TO_LABEL[value]}</div>`;
        }
        
        let html = `<div style="color:#64748b; font-size:11px; margin-bottom: 4px;">NV: ${CODE_TO_LABEL[originalRequest] || originalRequest}</div>`;
        let blocks = value.split(',');
        blocks.forEach(blk => {
            let parts = blk.split('|');
            let timePart = parts[0];
            let rolePart = parts[1] || '';
            let roleClass = 'role-none';
            if(rolePart) {
                let foundRole = ROLES.find(r => r.code === rolePart);
                if(foundRole) roleClass = foundRole.class;
            }
            
            html += `<div style="font-weight: 600; color: #1e293b;">${timePart}</div>`;
            if (rolePart) {
                 html += `<div class="role-badge ${roleClass}" style="display:inline-block; margin-top: 4px;">${rolePart}</div>`;
            }
        });
        return html;
    }

    async function loadData(password) {
        dataArea.innerHTML = '<div class="loading">Đang tải dữ liệu...</div>';
        try {
            const response = await fetch(`${SCRIPT_URL}?password=${encodeURIComponent(password)}`);
            const data = await response.json();
            if (data.error) { dataArea.innerHTML = `<div class="loading" style="color:red;">Lỗi: ${data.error}</div>`; return; }
            if (!Array.isArray(data) || data.length === 0) { 
                currentLoadedWeek = ''; // Khởi tạo biến rỗng nếu chưa có data
                dataArea.innerHTML = '<div class="loading">Chưa có dữ liệu cho tuần này. Bạn có thể nhấn Thêm nhân sự để bắt đầu.</div>'; return; 
            }
            renderTable(data);
        } catch (e) { dataArea.innerHTML = `<div class="loading" style="color:red;">Lỗi kết nối: ${e.message}</div>`; }
    }

    function renderTable(rows) {
        currentLoadedWeek = rows[0]?.['Tuần (bắt đầu)'] || ''; // Lưu lại tuần hiện tại
        const headerDates = getDayDates(currentLoadedWeek);
        
        let html = '<table><thead><tr>';
        html += '<th>STT</th><th>Họ tên</th><th>Tuần</th>';
        ['Thứ 2','Thứ 3','Thứ 4','Thứ 5','Thứ 6','Thứ 7','Chủ nhật'].forEach((day, i) => {
            html += `<th>${day}<span class="day-number">${headerDates[i]}</span></th>`;
        });
        html += '<th>Tổng Giờ</th><th>Trạng thái</th><th>Thao tác</th></tr></thead><tbody>';
        
        function guessOriginalRequest(cellValue) {
            if (!cellValue) return 'tu-do';
            if (CODE_TO_LABEL[cellValue]) return cellValue; 
            if (cellValue.includes('-')) {
                let parts = cellValue.split(',')[0].split('|')[0].split('-');
                if (parts.length === 2) {
                    let [sH, sM] = parts[0].trim().split(':').map(Number);
                    let [eH, eM] = parts[1].trim().split(':').map(Number);
                    if (!isNaN(sH) && !isNaN(eH)) {
                        let duration = (eH + eM/60) - (sH + sM/60);
                        if (duration <= 4) return 'nua-ca-sang'; 
                    }
                }
            }
            return 'tu-do'; 
        }

        rows.forEach((row, index) => {
            const rowIndex = row.rowIndex || (index + 2); 
            const codes = ['Thứ 2', 'Thứ 3', 'Thứ 4', 'Thứ 5', 'Thứ 6', 'Thứ 7', 'Chủ nhật'].map(d => row[d] || '');
            const status = row['Trạng thái'] || 'Chờ duyệt';
            const dayDates = getDayDates(row['Tuần (bắt đầu)'] || '');
            const weekText = (dayDates[0] && dayDates[6]) ? `${dayDates[0]}-${dayDates[6]}` : row['Tuần (bắt đầu)'];

            const originalRequests = codes.map(c => guessOriginalRequest(c));

            // Dòng hiển thị nhân viên
            html += `<tr class="employee-row" data-rowindex="${rowIndex}">`;
            html += `<td>${index + 1}</td><td style="font-weight:700;">${row['Họ tên'] || 'N/A'}</td><td class="week-range">${weekText}</td>`;
            codes.forEach((c, idx) => {
                 let isTimeFormat = c && (c.includes(':') || c.includes('|'));
                 if(status === 'Đã duyệt' && isTimeFormat) {
                     html += `<td>${parseAndDisplayEmployeeCell(c, originalRequests[idx])}</td>`;
                 } else {
                     let label = CODE_TO_LABEL[c] ? CODE_TO_LABEL[c] : (c === 'Nghỉ' ? 'Nghỉ' : ''); 
                     html += `<td style="color:#64748b; font-size:12px;">NV: ${label}</td>`;
                 }
            });
            html += `<td class="total-cell"></td><td><span class="status-badge ${status === 'Đã duyệt' ? 'status-approved' : 'status-pending'}">${status}</span></td><td></td></tr>`;

            // Dòng quản lý
            html += `<tr class="manager-row" data-rowindex="${rowIndex}"><td></td><td style="color:#0f172a; font-weight:600; font-size:13px; text-align:right;">Chốt giờ & Vai trò:</td><td></td>`;
            codes.forEach((c, idx) => { 
                html += `<td>${buildManagerCell(c, originalRequests[idx])}</td>`; 
            });
            html += `<td class="total-cell total-hours-edit">0h</td><td></td>`;
            html += `<td><button class="btn-update" onclick="updateRow(this)" data-rowindex="${rowIndex}">Lưu Duyệt</button></td></tr>`;
        });

        html += '</tbody></table>';
        dataArea.innerHTML = html;

        document.querySelectorAll('.manager-row').forEach(row => {
            row.querySelector('.total-hours-edit').textContent = window.calculateTotalHours(row) + "h";
        });
    }

    // ================= CHỨC NĂNG THÊM NHÂN SỰ TỪ QUẢN TRỊ =================
    addManualBtn.addEventListener('click', async () => {
        const adminPassword = passwordInput.value.trim();
        if (!adminPassword) return alert("Vui lòng đăng nhập trước!");

        const empName = prompt("Nhập họ tên nhân viên cần thêm:");
        if (!empName) return;

        let weekStart = currentLoadedWeek;
        // Nếu file sheet trắng tinh, chưa có tuần nào, yêu cầu quản lý nhập ngày thứ 2
        if (!weekStart) {
            let today = new Date();
            let defaultMonday = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
            weekStart = prompt("Nhập ngày Thứ 2 của tuần cần tạo (Định dạng: YYYY-MM-DD):", defaultMonday);
            if (!weekStart) return;
        }

        try {
            const oldText = addManualBtn.innerHTML;
            addManualBtn.innerHTML = '⏳ Đang xử lý...';
            addManualBtn.disabled = true;

            // Đóng gói data gửi lên sheet giống y hệt lúc nhân viên submit form
            const formData = new URLSearchParams();
            formData.append('employeeName', empName);
            formData.append('weekStart', weekStart);
            // Gửi mặc định là 'tu-do' (Tự do) để hàm tự động cộng 8 tiếng hoạt động đúng
            formData.append('day2', 'tu-do');
            formData.append('day3', 'tu-do');
            formData.append('day4', 'tu-do');
            formData.append('day5', 'tu-do');
            formData.append('day6', 'tu-do');
            formData.append('day7', 'tu-do');
            formData.append('dayCn', 'tu-do');

            // Không cần append('action', 'update') -> Script Google sẽ tự hiểu là hành động Add (Thêm mới)
            const response = await fetch(SCRIPT_URL, { method: 'POST', body: formData });
            const result = await response.json();
            
            if (result.success) {
                alert(`Đã thêm thành công nhân sự: ${empName}. Vui lòng chốt giờ cho bạn ấy ở cuối bảng!`);
                loadData(adminPassword); // Tải lại bảng để hiện người mới
            } else {
                alert('Lỗi: ' + result.error);
            }
            addManualBtn.innerHTML = oldText;
            addManualBtn.disabled = false;
        } catch (e) {
            alert('Lỗi hệ thống: ' + e.message);
            addManualBtn.innerHTML = `<svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg> Thêm Nhân Sự`;
            addManualBtn.disabled = false;
        }
    });

    window.updateRow = async function(btn) {
        const row = btn.closest('tr');
        const rowIndex = btn.dataset.rowindex;
        const adminPassword = passwordInput.value.trim();
        const cells = row.querySelectorAll('td');
        const dayValues = [];
        
        for(let i = 3; i <= 9; i++) {
            let blocks = cells[i].querySelectorAll('.time-block');
            let dayStrArr = [];
            blocks.forEach(blk => {
                let s = blk.querySelector('.t-start').value;
                let e = blk.querySelector('.t-end').value;
                let role = blk.querySelector('.role-select').value;
                if(s !== 'Nghỉ' && e !== 'Nghỉ') {
                    let val = `${s}-${e}`;
                    if(role) val += `|${role}`;
                    dayStrArr.push(val);
                }
            });
            dayValues.push(dayStrArr.length > 0 ? dayStrArr.join(',') : 'Nghỉ'); 
        }

        try {
            btn.textContent = 'Đang lưu...'; btn.disabled = true;
            const formData = new URLSearchParams({ action: 'update', adminPassword, rowIndex, 
                day2: dayValues[0], day3: dayValues[1], day4: dayValues[2], day5: dayValues[3], day6: dayValues[4], day7: dayValues[5], dayCn: dayValues[6] 
            });
            const response = await fetch(SCRIPT_URL, { method: 'POST', body: formData });
            const result = await response.json();
            
            if (result.success) { loadData(adminPassword); } 
            else { alert('Lỗi: ' + result.error); btn.textContent = 'Lưu Duyệt'; btn.disabled = false; }
        } catch (e) { alert('Lỗi hệ thống: ' + e.message); btn.textContent = 'Lưu Duyệt'; btn.disabled = false; }
    };

    // ================= XUẤT ẢNH BÁO CÁO =================
    exportImgBtn.addEventListener('click', function() {
        const rowsToExport = Array.from(document.querySelectorAll('.employee-row')).filter(r => r.querySelector('.status-approved'));
        if (!rowsToExport.length) return alert('Không có dòng nào đã duyệt để xuất ảnh.');

        const tempTable = document.createElement('table');
        tempTable.style.cssText = 'border-collapse: collapse; width: 100%; background: #ffffff; color: #000000; font-family: sans-serif; text-align: center;';
        
        const headerRow = document.querySelector('table thead tr').cloneNode(true);
        headerRow.deleteCell(-1); 
        Array.from(headerRow.cells).forEach(c => c.style.cssText = 'padding:12px; border: 1px solid #cbd5e1; background: #f8fafc; font-weight: bold;');
        tempTable.appendChild(headerRow);

        rowsToExport.forEach(row => {
            const clonedRow = row.cloneNode(true);
            clonedRow.deleteCell(-1); 
            
            const rowIndex = row.dataset.rowindex;
            const mgrRow = document.querySelector(`.manager-row[data-rowindex="${rowIndex}"]`);
            const totalHours = mgrRow ? mgrRow.querySelector('.total-hours-edit').innerText : '0h';
            
            Array.from(clonedRow.cells).forEach((c, index) => {
                c.style.cssText = 'padding:12px; border: 1px solid #cbd5e1; vertical-align: middle;';
                
                if (index === 10) {
                    c.innerText = totalHours;
                    c.style.fontWeight = 'bold';
                    c.style.color = '#1d4ed8'; 
                }
                
                const badge = c.querySelector('.status-badge');
                if (badge) badge.style.cssText = 'color: #15803d; font-weight: bold;';
                
                const roleBadges = c.querySelectorAll('.role-badge');
                roleBadges.forEach(rb => {
                    let bgColor = '#64748b'; 
                    if(rb.classList.contains('role-shipper')) bgColor = '#10b981';
                    else if(rb.classList.contains('role-picker')) bgColor = '#ec4899';
                    else if(rb.classList.contains('role-cashier')) bgColor = '#ef4444';
                    else if(rb.classList.contains('role-caller')) bgColor = '#a855f7';
                    
                    rb.style.cssText = `display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; color: white; margin-top: 6px; background-color: ${bgColor}; line-height: 1;`;
                });
            });
            tempTable.appendChild(clonedRow);
        });

        Object.assign(tempTable.style, { position: 'absolute', left: '-9999px' });
        document.body.appendChild(tempTable);
        
        const oldText = exportImgBtn.innerText;
        exportImgBtn.innerText = '⏳ Đang tạo ảnh...';

        html2canvas(tempTable, { scale: 2, backgroundColor: '#ffffff' }).then(canvas => {
            const link = document.createElement('a');
            link.download = `Lich-Lam-Viec-${new Date().toISOString().slice(0,10)}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
            document.body.removeChild(tempTable);
            exportImgBtn.innerText = oldText;
        });
    });

    // ================= XUẤT EXCEL GANTT CHART =================
    exportExcelBtn.addEventListener('click', async function() {
        try {
            exportExcelBtn.innerHTML = '⏳ Đang tạo Excel...';
            
            const workbook = new ExcelJS.Workbook();
            const dayNames = ['Thứ 2', 'Thứ 3', 'Thứ 4', 'Thứ 5', 'Thứ 6', 'Thứ 7', 'Chủ nhật'];
            
            const employees = [];
            document.querySelectorAll('.employee-row').forEach(empRow => {
                const rowIndex = empRow.dataset.rowindex;
                const name = empRow.cells[1].innerText;
                const status = empRow.querySelector('.status-badge').innerText;
                if(status !== 'Đã duyệt') return;

                const mgrRow = document.querySelector(`.manager-row[data-rowindex="${rowIndex}"]`);
                const dayTimes = [];
                for (let i = 3; i <= 9; i++) {
                    const cell = mgrRow.cells[i];
                    const blocks = cell.querySelectorAll('.time-block');
                    const times = [];
                    blocks.forEach(blk => {
                        const s = blk.querySelector('.t-start').value;
                        const e = blk.querySelector('.t-end').value;
                        const role = blk.querySelector('.role-select').value;
                        if (s !== 'Nghỉ' && e !== 'Nghỉ') times.push({ start: s, end: e, role: role });
                    });
                    dayTimes.push(times);
                }
                employees.push({ name, dayTimes });
            });

            if(employees.length === 0) {
                alert("Không có nhân viên nào 'Đã duyệt' để xuất Excel!");
                exportExcelBtn.innerHTML = `📊 Xuất Excel`;
                return;
            }

            dayNames.forEach((dayName, dayIndex) => {
                const sheet = workbook.addWorksheet(dayName);

                const headerRow = ['STT', 'Họ tên', 'Vai trò', 'Khung giờ'];
                for(let h = 6; h <= 24; h++) {
                    let hh = h.toString().padStart(2, '0');
                    headerRow.push(`${hh}:00`);
                    if(h !== 24) {
                        headerRow.push(`${hh}:15`, `${hh}:30`, `${hh}:45`);
                    }
                }
                const header = sheet.addRow(headerRow);
                
                header.eachCell((cell, colNumber) => {
                    cell.font = { bold: true };
                    cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFE2E8F0' } };
                    cell.border = { top: {style:'thin'}, left: {style:'thin'}, bottom: {style:'thin'}, right: {style:'thin'} };
                    if (colNumber > 4) { 
                        cell.alignment = { horizontal: 'center', vertical: 'middle', textRotation: 90 };
                    } else {
                        cell.alignment = { horizontal: 'center', vertical: 'middle' };
                    }
                });

                sheet.getColumn(1).width = 5;
                sheet.getColumn(2).width = 25;
                sheet.getColumn(3).width = 15; 
                sheet.getColumn(4).width = 15; 
                
                for(let i = 5; i <= 77; i++) {
                    sheet.getColumn(i).width = 3.5;
                }

                let dayData = [];
                employees.forEach(emp => {
                    const times = emp.dayTimes[dayIndex];
                    if(times.length > 0) {
                        times.forEach(t => {
                            dayData.push({
                                name: emp.name,
                                role: t.role,
                                start: t.start,
                                end: t.end
                            });
                        });
                    } else {
                        dayData.push({
                            name: emp.name,
                            role: '',
                            start: 'Nghỉ',
                            end: 'Nghỉ'
                        });
                    }
                });

                const roleOrder = { 'Shipper': 1, 'Picker': 2, 'Cashier': 3, 'Caller': 4, '': 5 };
                dayData.sort((a, b) => {
                    if (roleOrder[a.role] !== roleOrder[b.role]) return roleOrder[a.role] - roleOrder[b.role];
                    if (a.start !== b.start) return a.start.localeCompare(b.start);
                    return a.name.localeCompare(b.name);
                });

                dayData.forEach((dataRow, index) => {
                    const row = [index + 1, dataRow.name, dataRow.role];
                    
                    let timeStr = (dataRow.start !== 'Nghỉ' && dataRow.end !== 'Nghỉ') ? `${dataRow.start} - ${dataRow.end}` : 'Nghỉ';
                    row.push(timeStr);

                    for(let i=0; i<73; i++) row.push('');
                    
                    const sheetRow = sheet.addRow(row);
                    
                    for(let i=1; i<=4; i++) {
                        sheetRow.getCell(i).border = { top: {style:'thin'}, left: {style:'thin'}, bottom: {style:'thin'}, right: {style:'thin'} };
                        sheetRow.getCell(i).alignment = { vertical: 'middle' };
                    }

                    if(dataRow.start !== 'Nghỉ' && dataRow.end !== 'Nghỉ') {
                        let [sH, sM] = dataRow.start.split(':').map(Number);
                        let [eH, eM] = dataRow.end.split(':').map(Number);
                        
                        let startIndex = (sH - 6) * 4 + (sM / 15) + 5; 
                        let endIndex = (eH - 6) * 4 + (eM / 15) + 5;

                        let colorHex = 'FFCBD5E1'; 
                        if(dataRow.role) {
                            let foundRole = ROLES.find(r => r.code === dataRow.role);
                            if(foundRole) colorHex = foundRole.color;
                        }

                        for(let c = startIndex; c < endIndex; c++) {
                            const cell = sheetRow.getCell(c);
                            cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: colorHex } };
                            cell.border = { top: {style:'thin'}, bottom: {style:'thin'} }; 
                        }
                        if (startIndex < 78) sheetRow.getCell(startIndex).border = { left: {style:'thin'}, top: {style:'thin'}, bottom: {style:'thin'} };
                        if (endIndex - 1 < 78 && endIndex > 5) sheetRow.getCell(endIndex - 1).border = { right: {style:'thin'}, top: {style:'thin'}, bottom: {style:'thin'} };
                    } else {
                        for(let c = 5; c <= 77; c++) {
                            sheetRow.getCell(c).border = { top: {style:'dotted', color: {argb: 'FFCCCCCC'}}, bottom: {style:'dotted', color: {argb: 'FFCCCCCC'}} };
                        }
                    }
                });
            });

            const buffer = await workbook.xlsx.writeBuffer();
            const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
            saveAs(blob, `Bieu-Do-Phan-Ca-${new Date().toISOString().slice(0,10)}.xlsx`);
            
            exportExcelBtn.innerHTML = `✅ Đã xuất Excel`;
            setTimeout(() => { 
                exportExcelBtn.innerHTML = `<svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg> Xuất Excel`; 
            }, 3000);

        } catch (error) {
            console.error(error);
            alert("Đã xảy ra lỗi khi tạo file Excel!");
            exportExcelBtn.innerHTML = `<svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg> Xuất Excel`;
        }
    });

    loginBtn.addEventListener('click', () => {
        if (!passwordInput.value.trim()) return;
        loginPopup.classList.add('hidden');
        mainContent.classList.add('visible');
        loadData(passwordInput.value.trim());
    });
    passwordInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') loginBtn.click(); });
</script>
